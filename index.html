<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenin.cc</title>
    <style>
        body { background: black; color: white; font-family: monospace; margin: 0; padding: 20px; }
        .screen { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none; }
        h1 { font-size: 48px; color: #ff3333; }
        h2 { font-size: 36px; color: #ff3333; }
        input { padding: 15px; margin: 20px; width: 300px; background: #222; border: 2px solid #ff3333; color: white; text-align: center; }
        button { padding: 15px 40px; background: #222; border: 2px solid #ff3333; color: white; font-size: 20px; cursor: pointer; margin: 10px; }
        button:hover { background: #ff3333; }
        .error { color: #ff3333; margin: 10px; }
        .success { color: #00ff00; }
        .logs { text-align: left; background: #111; padding: 20px; margin: 20px; }
        .add { color: #00ff00; }
        .remove { color: #ff3333; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Приветствие -->
        <div id="welcomeScreen" class="screen">
            <h1>Добро пожаловать, хацкер</h1>
            <button onclick="showScreen('keyScreen')">Продолжить</button>
        </div>

        <!-- Ключ -->
        <div id="keyScreen" class="screen hidden">
            <h2>Ключ система</h2>
            <input type="text" id="keyInput" placeholder="ZENIN-XXXX-XXXX-XXXX">
            <div id="keyError" class="error"></div>
            <button onclick="submitKey()">Продолжить</button>
            <button onclick="showScreen('welcomeScreen')">Назад</button>
        </div>

        <!-- Главное меню -->
        <div id="mainScreen" class="screen hidden">
            <h1>Zenin<span style="color:#ff3333">.cc</span></h1>
            <button onclick="alert('Start Game')">Start Game</button>
            <button onclick="showScreen('updateScreen')">Update Logs</button>
        </div>

        <!-- Обновления -->
        <div id="updateScreen" class="screen hidden">
            <h2>Beta Test 1.0.0</h2>
            <div class="logs">
                <p class="add">+ меню</p>
                <p class="add">+ ключ система</p>
                <p class="add">+ чит</p>
                <p class="remove">- баги</p>
            </div>
            <button onclick="showScreen('mainScreen')">Назад</button>
        </div>

        <!-- Успех -->
        <div id="successScreen" class="screen hidden">
            <div style="font-size:72px; color:#00ff00; margin:50px">✓</div>
            <h2 class="success">Успешно!</h2>
            <button onclick="showScreen('mainScreen')">OK</button>
        </div>
    </div>

    <script>
        let telegramId = 'user_' + Math.random().toString(36).substring(2);
        const API_URL = '/api';

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function submitKey() {
            const key = document.getElementById('keyInput').value.replace(/ZENIN-|-/g, '');
            const errorDiv = document.getElementById('keyError');
            
            try {
                const res = await fetch(`${API_URL}/verify-key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, telegram_id: telegramId })
                });
                const data = await res.json();
                
                if (data.valid) {
                    showScreen('successScreen');
                    setTimeout(() => showScreen('mainScreen'), 1500);
                } else {
                    errorDiv.innerText = data.message || 'Неверный ключ';
                }
            } catch {
                errorDiv.innerText = 'Ошибка соединения';
            }
        }

        showScreen('welcomeScreen');
    </script>
</body>
</html>
